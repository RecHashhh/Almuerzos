<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ripconciv — Acceso Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="js/config.js"></script>
<link rel="stylesheet" href="js/shared.css">
<style>
body.dark{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
body.dark::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 55% at 50% 0%,rgba(232,80,10,.15) 0%,transparent 65%);
  pointer-events:none;}
.wrap{width:100%;max-width:380px;}
.brand{text-align:center;margin-bottom:32px;}
.brand-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--brand-dark),var(--brand-light));
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;margin:0 auto 14px;box-shadow:0 8px 24px rgba(232,80,10,.35);}
.brand h1{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;}
.brand h1 span{color:var(--brand-light);}
.brand p{color:var(--muted);font-size:.82rem;margin-top:4px;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:28px;box-shadow:var(--shadow-lg);}
.role-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px;
  background:var(--surface);padding:6px;border-radius:14px;}
.role-tab{padding:10px;border-radius:10px;border:none;background:transparent;color:var(--muted);
  font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;
  transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px;}
.role-tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3);}
.role-hint{background:var(--surface);border-radius:10px;padding:10px 14px;
  font-size:.78rem;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.role-hint strong{color:var(--brand-light);}
.back{display:block;text-align:center;margin-top:16px;font-size:.8rem;
  color:var(--muted);text-decoration:none;transition:color .2s;}
.back:hover{color:var(--text);}
</style>
</head>
<body class="dark">
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">🔐</div>
    <h1>RIP<span>CONCIV</span></h1>
    <p>Panel interno — acceso restringido</p>
  </div>
  <div class="login-card">
    <div class="role-tabs">
      <button class="role-tab active" id="tab-admin"  onclick="setRol('admin')">📊 Administrador</button>
      <button class="role-tab"        id="tab-cocina" onclick="setRol('cocina')">🍽️ Cocina</button>
    </div>
    <div class="role-hint" id="role-hint">
      <strong>Administrador:</strong> reportes, historial, gestión de invitados y validación de checks.
    </div>
    <div class="alert alert-error" id="alert-err">❌ Usuario o contraseña incorrectos.</div>
    <div class="form-group">
      <label class="form-label">Usuario</label>
      <input type="text" class="form-input" id="inp-user" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-input" id="inp-pass" placeholder="••••••••"
        autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn btn-primary btn-full" onclick="login()">Ingresar</button>
  </div>
  <a href="index.html" class="back">← Volver al registro de empleados</a>
</div>
<script>
let rolActual='admin';
const p=new URLSearchParams(window.location.search);
if(p.get('rol')==='cocina') setRol('cocina');
function setRol(r){
  rolActual=r;
  document.getElementById('tab-admin').classList.toggle('active',r==='admin');
  document.getElementById('tab-cocina').classList.toggle('active',r==='cocina');
  document.getElementById('alert-err').classList.remove('show');
  document.getElementById('inp-user').placeholder=r;
  const h=document.getElementById('role-hint');
  h.innerHTML=r==='admin'
    ?'<strong>Administrador:</strong> reportes, historial, gestión de invitados y validación de checks.'
    :'<strong>Cocina:</strong> vista en tiempo real, confirmar asistencia y pedidos para llevar.';
}
function login(){
  const u=document.getElementById('inp-user').value.trim().toLowerCase();
  const p=document.getElementById('inp-pass').value;
  const match=Object.entries(CONFIG.usuarios).find(([k,d])=>k.toLowerCase()===u&&d.password===p&&d.rol===rolActual);
  if(!match){document.getElementById('alert-err').classList.add('show');document.getElementById('inp-pass').value='';return;}
  setSession(rolActual);
  window.location.href=rolActual==='admin'?'admin.html':'cocina.html';
}
</script>
</body></html>
